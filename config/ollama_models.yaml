# ─── Required Ollama Models ────────────────────────────────────
# Pulled by sutra-ai-ollama-init (scripts/ollama_init.sh) on every deploy.
#
# Keep this list aligned with:
#   - intelligence_config.yaml → providers.ollama.fallback_models + fallback_model
#   - intelligence_config.yaml → smart_router.model_tiers.ollama (simple/moderate/complex)
#   - .env → OLLAMA_MODEL (also merged at init if set; see docker-compose)
#
# Software Factory: add a model here → ollama-init pulls it before the API starts.
#
# ⚡ Optimized for 8 GB Apple Silicon — only models that fit comfortably in memory.
# Heavy models (8B+) removed to prevent memory thrashing on low-RAM hosts.

# ─── Core inference (must match engine routing / fallbacks) ───
core:
  - qwen3:1.7b            # Primary: router + simple/moderate tasks (1.2 GB)
  - qwen3:4b              # Complex tasks only — loaded on demand (2.8 GB)
  - smollm2:360m           # Ultra-light emergency fallback (250 MB)

# REMOVED for 8 GB hosts (uncomment on 16 GB+ machines):
#  - gemma4:e4b
#  - qwen2.5:3b
#  - phi4-mini
#  - smollm2:1.7b
#  - llama3:8b
#  - llama3.1:8b

# ─── Domain / tuning bases (uncomment if you run local LoRA / clusters) ───
domain:
  # - qwen2.5-coder:3b
  # - phi4-mini:latest-sutra-tuned

# ─── Embeddings (RAG / Qdrant via Ollama) ─────────────────────
embeddings:
  - nomic-embed-text
