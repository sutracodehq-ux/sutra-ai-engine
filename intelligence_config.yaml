# ─── Agent → Tool Mapping ──────────────────────────────────
# Which agents get which built-in tools
agent_tools:
  seo: [calculator, keyword_extractor, text_analyzer, get_datetime]
  content_grader: [text_analyzer, keyword_extractor]
  budget_optimizer: [calculator, get_datetime]
  roi_calculator: [calculator]
  pricing_strategist: [calculator]
  performance_reporter: [calculator, get_datetime]
  campaign_strategist: [calculator, get_datetime, keyword_extractor]
  copywriter: [text_analyzer, keyword_extractor]
  social_media: [text_analyzer, get_datetime, keyword_extractor]
  email_campaign: [text_analyzer, get_datetime]
  quiz_generator: [calculator]
  note_generator: [text_analyzer, keyword_extractor]
  stock_analyzer: [calculator, get_datetime]
  stock_predictor: [calculator, get_datetime]
  market_trend_analyzer: [calculator, get_datetime]
  crypto_analyzer: [calculator, get_datetime]
  personal_assistant: [calculator, text_analyzer, keyword_extractor, get_datetime]
  image_generator: [text_analyzer, keyword_extractor]
  video_generator: [text_analyzer, keyword_extractor]

# ─── Agent Chain Configs ───────────────────────────────────
# Agents that get a review step after primary execution
agent_chains:
  seo:
    type: review
    reviewer_prompt: |
      You are a senior SEO reviewer. Evaluate this SEO analysis for:
      1. Are all fields complete and properly formatted as JSON?
      2. Are the keyword suggestions relevant and specific (not generic)?
      3. Is the meta title under 60 chars and meta description under 160 chars?
      4. Are content suggestions actionable?
      If GOOD: {"approved": true, "score": 8-10}
      If needs work: {"approved": false, "score": 1-7, "feedback": "..."}

  campaign_strategist:
    type: review
    reviewer_prompt: |
      You are a senior marketing strategist. Review this campaign strategy for:
      1. Is the target audience clearly defined?
      2. Are the channels and budget allocation realistic?
      3. Are KPIs measurable and time-bound?
      4. Is the timeline feasible?
      If GOOD: {"approved": true, "score": 8-10}
      If needs work: {"approved": false, "score": 1-7, "feedback": "..."}

  competitor_analyst:
    type: review
    reviewer_prompt: |
      You are a competitive intelligence expert. Review this analysis for:
      1. Are competitor strengths/weaknesses specific?
      2. Are actionable recommendations provided?
      3. Is the data structured properly?
      If GOOD: {"approved": true, "score": 8-10}
      If needs work: {"approved": false, "score": 1-7, "feedback": "..."}

  quiz_generator:
    type: review
    reviewer_prompt: |
      You are an assessment quality expert. Review these quiz questions for:
      1. Are all question types present (MCQ, T/F, fill-blank, short answer)?
      2. Are MCQ distractors plausible?
      3. Does every answer have an explanation?
      4. Is difficulty mix balanced (40/40/20)?
      If GOOD: {"approved": true, "score": 8-10}
      If needs work: {"approved": false, "score": 1-7, "feedback": "..."}

  stock_analyzer:
    type: review
    reviewer_prompt: |
      You are a senior financial analyst. Review this stock analysis for:
      1. Are technical indicators properly calculated?
      2. Is the risk assessment quantified?
      3. Are price targets realistic with proper rationale?
      If GOOD: {"approved": true, "score": 8-10}
      If needs work: {"approved": false, "score": 1-7, "feedback": "..."}

# ─── Prompt Engine ─────────────────────────────────────────
prompt_engine:
  bandit_algorithm: thompson_sampling   # thompson_sampling | ucb1 | epsilon_greedy
  min_trials_before_bandit: 5           # Min trials per variant before bandit kicks in
  success_threshold: 7.0                # Score >= this counts as "success" for Beta distribution
  min_trials_for_promotion: 10
  promotion_margin: 0.5
  min_win_rate: 60.0
  retirement_trials_multiplier: 2
  retirement_win_rate_threshold: 30.0

# ─── Learning (cloud → local dataset) ─────────────────────
learning:
  cloud_teaching:
    enabled: true
    # When quality_score is set (Brain paths), drop rows below this (0–10 scale). None/unset in streaming skips this gate.
    min_quality_score: 0.0
    max_prompt_chars: 120000
    max_response_chars: 120000
    output_dir: "training/cloud_teaching"

# ─── Distillation ─────────────────────────────────────────
distillation:
  sample_topics:
    - photosynthesis
    - machine learning basics
    - world war 2
    - digital marketing
    - python programming
    - climate change
    - human anatomy
    - blockchain technology
    - artificial intelligence
    - quantum computing
    - data science
    - web development
    - social media marketing
    - content strategy
    - email marketing campaigns
    - brand positioning
    - competitive analysis for startups
    - customer retention
    - e-commerce optimization
    - influencer marketing strategy

  prompt_templates:
    edtech:
      - "Generate a quiz from these notes on {topic}"
      - "Create flashcards for the chapter on {topic}"
      - "Summarize the key points of {topic} for revision"
      - "Plan a 45-minute lecture on {topic} for undergraduate students"
      - "Extract the most important concepts from this text about {topic}"
    finance:
      - "Analyze the stock performance of {topic}"
      - "Predict the market trend for {topic} sector"
      - "Generate a risk assessment report for investing in {topic}"
      - "Create a portfolio allocation strategy including {topic}"
    marketing:
      - "Create a social media strategy for {topic}"
      - "Write a marketing campaign brief for {topic}"
      - "Generate SEO-optimized content about {topic}"
      - "Design an email campaign for {topic}"
    coding:
      - "Refactor this code to follow the Software Factory Principle: {topic}"
      - "Create a polymorphic AI agent for {topic}"
      - "Write a Zod schema and React Hook Form for {topic}"
      - "Generate a FastAPI endpoint for {topic} with type safety"
      - "Implement a recursive search for {topic} in a large JSON structure"
    default:
      - "Create professional content about {topic}"
      - "Analyze and provide recommendations for {topic}"
      - "Generate a detailed report on {topic}"
      - "Write a comprehensive strategy for {topic}"
      - "Provide expert advice on {topic}"

# ─── Response Cache ────────────────────────────────────────
response_cache:
  enabled: true
  default_ttl: 3600               # 1 hour default
  min_response_length: 50         # Don't cache very short responses

  # Per-agent TTL overrides (seconds)
  agent_ttl:
    stock_analyzer: 300           # 5 min — stock data changes fast
    stock_predictor: 300
    crypto_analyzer: 300
    market_trend_analyzer: 600    # 10 min
    ai_trend_tracker: 7200        # 2 hours — trends don't change fast
    seo: 3600                     # 1 hour
    copywriter: 1800              # 30 min — creative content varies
    quiz_generator: 7200          # 2 hours
    note_generator: 7200

# ─── LoRA Training ─────────────────────────────────────────
lora_training:
  min_examples_for_training: 20   # Skip training if fewer examples
  min_response_length: 50         # Min chars for valid training example
  max_examples_in_modelfile: 20   # Max examples baked into Modelfile
  error_patterns:                 # Filter out error responses
      - "Return ONLY valid JSON."
      - "ALWAYS include ALL keys in the response schema (mcq_questions, true_false_questions, fill_blanks, short_answer, match_following, metadata), even if the array for a section is empty."
      - "No markdown code fences."
      - "error"
      - "failed"
      - "sorry, i can't"
      - "i'm unable to"
      - "as an ai"
      - "i cannot"

# ─── Evolution Engine ──────────────────────────────────────
evolution_engine:
  # Model families to check for updates in Ollama
  tracked_model_families:
    - "qwen2.5-coder:7b"
    - "qwen2.5-coder:32b"
    - "qwen2.5:3b"
    - "qwen2.5:7b"
    - "llama3.2:3b"
    - "llama3.1:8b"
    - "mistral:7b"
    - "gemma2:2b"
    - "gemma2:9b"
    - "llama3.2:1b"
    - "llama3.2:1b"
    - "llama3.2:1b"
    - "llama3.2:1b"
    - "llama3.2:1b"
    - "llama3.2:1b"
    - "llama3.2:1b"
    - "llama3.2:1b"
    - "llama3.2:1b"
    - "llama3.2:1b"
    - "llama3.2:1b"

  # Specific models to benchmark against current
  candidate_models:
     ollama_model: str = "phi4-mini:latest"

  # Upgrade thresholds
  min_quality_improvement: 0.5   # Minimum quality score improvement to upgrade
  max_latency_increase_pct: 50   # Max % latency increase allowed for upgrade

  # Benchmark test prompts
  benchmark_prompts:
    - prompt: "Explain photosynthesis in 3 sentences."
      expected_keywords: [sunlight, carbon dioxide, oxygen, chlorophyll]
      max_tokens: 200
    - prompt: "Write a JSON object with keys: name, age, city for a fictional person."
      expected_keywords: [name, age, city]
      max_tokens: 100
      format_check: json
    - prompt: "List 5 marketing strategies for a SaaS startup. Return as JSON array."
      expected_keywords: [content, social, email, seo]
      max_tokens: 500
      format_check: json
    - prompt: "Calculate the ROI if I invest $10,000 and get back $15,000 after 2 years."
      expected_keywords: ["50%", ROI, return]
      max_tokens: 200
    - prompt: "Write a professional product description for a wireless noise-cancelling headphone."
      expected_keywords: [noise, battery, comfort, sound, wireless]
      max_tokens: 300
    - prompt: "Create a SWOT analysis for a food delivery startup in JSON format."
      expected_keywords: [strengths, weaknesses, opportunities, threats]
      max_tokens: 400
      format_check: json

  # Self-teaching prompts (diverse domains for broad learning)
  self_teaching_prompts:
    - "Explain the concept of supply and demand in economics"
    - "Write a professional email asking for a meeting next week"
    - "Create a Python function that validates email addresses"
    - "Generate a SWOT analysis template for a tech startup"
    - "Describe the process of machine learning model training"
    - "Write a product description for a smart water bottle"
    - "Explain blockchain technology to a 10-year-old"
    - "Create a weekly meal plan for a vegetarian diet"
    - "Analyze the pros and cons of remote work"
    - "Write a cover letter for a software engineering position"
    - "Generate 5 social media post ideas for a coffee brand"
    - "Explain the difference between SQL and NoSQL databases"
    - "Write a press release for a new AI product launch"
    - "Create a risk assessment for a cryptocurrency investment"
    - "Summarize the key principles of agile project management"

# ─── A2A Routes (Agent-to-Agent) ───────────────────────────
a2a_routes:
  stock_predictor:
    can_consult: [ai_trend_tracker, market_trend_analyzer, crypto_analyzer]
  stock_analyzer:
    can_consult: [market_trend_analyzer, ai_trend_tracker]
  campaign_strategist:
    can_delegate: [copywriter, social_media, email_campaign]
    can_consult: [seo, content_grader]
  seo:
    can_consult: [content_grader, copywriter]
  copywriter:
    can_consult: [seo, content_grader]
  data_curator:
    can_consult: [dataset_optimizer, ml_pipeline]
  dataset_optimizer:
    can_consult: [data_curator, ml_pipeline]
  ml_pipeline:
    can_delegate: [data_curator, dataset_optimizer]
    can_consult: [ai_trend_tracker]

# ─── Orchestrator ──────────────────────────────────────────
orchestrator:
  max_sub_tasks: 5
  max_parallel: 3
  synthesis_model: null  # Use default model

# ─── Agentic RAG ──────────────────────────────────────────
agentic_rag:
  min_relevance_threshold: 0.5
  max_iterations: 2
  max_chunks: 5
  collections:
    - web_articles
    - stock_data
    - crypto_data
    - agent_responses
    - knowledge_graph

# ─── Knowledge Graph ──────────────────────────────────────
knowledge_graph:
  entity_types:
    - company
    - person
    - technology
    - product
    - concept
    - market_sector
    - cryptocurrency
    - stock_ticker
    - ai_model
    - framework

# ─── Auto Benchmark ───────────────────────────────────────
auto_benchmark:
  min_quality_for_benchmark: 7.0
  max_benchmarks_per_run: 10

# ─── VPS-Aware Admission (Dynamic Load Profiles) ────────────
# Automatically degrades local model usage under VPS load.
# Profiles activate based on active stream count thresholds.
vps_admission:
  enabled: true
  profiles:
    normal:
      max_local_streams: 2
      max_queue_wait_s: 0.5
      prefer_chain: [groq, gemini, ollama]
    high_load:
      max_local_streams: 1
      max_queue_wait_s: 0.3
      prefer_chain: [groq, gemini, ollama]
      trigger_active_streams: 2
    critical:
      max_local_streams: 0
      max_queue_wait_s: 0.1
      prefer_chain: [groq, gemini, openai]
      trigger_active_streams: 3
    compact_8gb:                # NEW — for Apple Silicon 8 GB
      max_local_streams: 1
      max_queue_wait_s: 0.2
      prefer_chain: [groq, gemini, nvidia, ollama]
      trigger_active_streams: 1

# ─── Software Factory Rollout Gates ─────────────────────────
factory_rollout_gates:
  streaming:
    p50_first_token_ms: 700
    p95_first_token_ms: 1800
    min_tokens_per_sec: 8.0
    max_stream_interrupt_rate: 0.02
    max_emergency_fallback_rate: 0.05
    min_format_integrity_rate: 0.98
  text_quality:
    min_avg_score: 6.5
    max_empty_response_rate: 0.02
    max_escalation_rate: 0.30
  json_integrity:
    min_field_coverage: 0.90
    max_parse_failure_rate: 0.05
  cost:
    max_monthly_usd: 50
    max_cost_per_request_usd: 0.05
  latency:
    p50_complete_ms: 2000
    p95_complete_ms: 8000
  image:
    max_failure_rate: 0.10
    max_avg_latency_ms: 5000
  voice:
    max_stt_error_rate: 0.15
    max_tts_latency_ms: 2000

# ─── Routing Policy (OSS-First) ─────────────────────────────
# Policy notes; primary driver order is smart_router.driver_chains + global_driver_chain.
routing_policy:
  oss_first: true
  paid_escalation_only_on:
    - quality_gate_fail
    - circuit_breaker_open
    - latency_budget_exceeded
  paid_providers: [openai, anthropic, together, fireworks]
  free_providers: [ollama, fast_local, bitnet, groq, gemini, nvidia, sarvam]

# ─── Model Matrix Profiles (balanced cost-effective rollout) ──
model_matrix:
  active_profile: balanced_default
  # Overrides via env AI_MATRIX_PROFILE; fallback to active_profile if empty.
  profiles:
    budget_strict:
      monthly_budget_usd: 100
      max_cost_per_request_usd: 0.02
      global_driver_chain: [groq, nvidia, gemini, together, ollama, fireworks, openai, anthropic, sarvam]
      driver_chains:
        english:
          simple: [groq, nvidia, gemini, together, ollama, fireworks, openai, sarvam, anthropic]
          moderate: [groq, nvidia, gemini, together, ollama, fireworks, openai, sarvam, anthropic]
          complex: [groq, nvidia, gemini, together, fireworks, ollama, openai, anthropic, sarvam]
        indic:
          simple: [groq, nvidia, gemini, together, ollama, fireworks, openai, sarvam, anthropic]
          moderate: [groq, nvidia, gemini, together, ollama, fireworks, openai, sarvam, anthropic]
          complex: [groq, nvidia, gemini, together, fireworks, ollama, openai, anthropic, sarvam]
    balanced_default:
      monthly_budget_usd: 100
      max_cost_per_request_usd: 0.05
      global_driver_chain: [groq, nvidia, gemini, together, fireworks, ollama, openai, anthropic, sarvam, bitnet]
      driver_chains:
        english:
          simple: [groq, nvidia, gemini, together, ollama, fireworks, openai, sarvam, anthropic, bitnet]
        indic:
          simple: [groq, nvidia, gemini, together, ollama, fireworks, openai, sarvam, anthropic, bitnet]
    quality_burst:
      monthly_budget_usd: 250
      max_cost_per_request_usd: 0.15
      global_driver_chain: [nvidia, openai, anthropic, gemini, groq, together, fireworks, ollama, sarvam]
      driver_chains:
        english:
          complex: [nvidia, openai, anthropic, gemini, groq, together, fireworks, ollama, sarvam]
        indic:
          complex: [nvidia, openai, anthropic, gemini, groq, together, fireworks, ollama, sarvam]
  rollback:
    max_emergency_fallback_rate: 0.05
    max_empty_response_rate: 0.02
    max_p95_complete_ms: 8000

# ─── Provider Trial Harness (A/B by benchmark only) ──────────
provider_trials:
  enabled: true
  candidates:
    - together
    - fireworks
  benchmark_gates:
    require_cost_non_increase: true
    require_text_quality_non_regression: true
    require_json_parse_non_regression: true
    max_stream_interrupt_rate: 0.02
  compare_against_profile: balanced_default

# ─── Routing (driver roles — order is resilience.global_driver_chain only) ───
routing:
  # On-box drivers: excluded from "cloud" loops and listed first for fast_local route hints
  local_driver_ids:
    - ollama
    - bitnet
    - fast_local
  # Brain hybrid local-first attempt (must be a registered driver name, usually ollama)
  hybrid_local_driver: ollama

# ─── Live knowledge distillation (LLM for dataset generation) ───
live_knowledge:
  driver: groq
  model: llama-3.3-70b-versatile

# ─── Voice Models (NVIDIA Small-Model Tiers) ────────────────
voice_models:
  nvidia:
    stt: parakeet-tdt-0.6b-v2
    tts: null  # Edge-TTS is free — no need for NVIDIA TTS

# ─── VoIP Engine (Self-Hosted) ─────────────────────────────
voip:
  # Faster-Whisper STT (Speech-to-Text)
  stt:
    model_size: "base"              # tiny, base, small, medium, large-v3
    device: "cpu"                   # cpu or cuda
    compute_type: "int8"            # int8 (CPU) or float16 (GPU)
    beam_size: 5
    force_language: null            # null = auto-detect, "hi" = force Hindi

  # Edge-TTS (Text-to-Speech) — Indian Voices
  tts:
    default_voice: "en-IN-NeerjaNeural"
    indian_voices:
      hi: "hi-IN-SwaraNeural"          # Hindi female
      hi_male: "hi-IN-MadhurNeural"    # Hindi male
      en: "en-IN-NeerjaNeural"         # Indian English female
      en_male: "en-IN-PrabhatNeural"   # Indian English male
      ta: "ta-IN-PallaviNeural"        # Tamil female
      te: "te-IN-ShrutiNeural"         # Telugu female
      bn: "bn-IN-TanishaaNeural"       # Bengali female
      mr: "mr-IN-AarohiNeural"         # Marathi female
      kn: "kn-IN-SapnaNeural"          # Kannada female
      ml: "ml-IN-SobhanaNeural"        # Malayalam female
      gu: "gu-IN-DhwaniNeural"         # Gujarati female
      pa: "pa-IN-GurpreetNeural"       # Punjabi male

  # India-First Personas
  personas:
    support_agent_india:
      name: "Support Agent (India)"
      voice: "hi-IN-SwaraNeural"
      agent: "chatbot_trainer"
      tone: "polite, respectful, patient, helpful"
      languages: ["hi", "en", "hinglish"]
      max_turns: 30
      transfer_to_human: true
      greetings:
