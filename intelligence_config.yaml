# ─── Intelligence Module Configuration ──────────────────────
# All configurable constants for the AI intelligence pipeline.
# Never hardcode these in Python — edit this file instead.

# ─── Load Balancer (per-driver concurrency limits) ──────────
load_balancer:
  driver_limits:
    ollama: 1          # CPU-bound — keep in sync with OLLAMA_NUM_PARALLEL on small hosts
    groq: 20           # Cloud API — high concurrency
    sarvam: 10         # Cloud API
    together: 12       # OpenAI-compatible OSS cloud
    fireworks: 12      # OpenAI-compatible OSS cloud
    openai: 20         # Cloud API
    anthropic: 10      # Cloud API
    gemini: 20         # Cloud API
    nvidia: 10         # Cloud API
    bitnet: 2          # Local 1-bit service (conservative concurrency)
    fast_local: 6     # vLLM/TGI hot path

# ─── Provider Metadata (Base URLs & Timeouts) ──────────────
# Single source of truth for driver connection params.
# Tuning timeouts = edit here. Zero code changes.
providers:
  openai:
    base_url: "https://api.openai.com/v1"
    timeout_connect_s: 10
    timeout_read_s: 120
    # Tiny-model cascade (same driver, lighter / alternate models on failure)
    fallback_models:
      - gpt-4o-mini
      - gpt-3.5-turbo
  groq:
    base_url: "https://api.groq.com/openai/v1"
    timeout_connect_s: 10
    timeout_read_s: 120
    # Smaller model first: chain streaming retries these after 429 / primary failure (same driver).
    fallback_models:
      - llama-3.1-8b-instant
      - llama-3.3-70b-versatile
  nvidia:
    base_url: "https://integrate.api.nvidia.com/v1"
    timeout_connect_s: 10
    timeout_read_s: 120
    fallback_models:
      - nvidia/mistral-nemo-minitron-8b-base
      - meta/llama-3.1-8b-instruct
      - meta/llama-3.1-70b-instruct
  sarvam:
    base_url: "https://api.sarvam.ai/v1"
    timeout_connect_s: 10
    timeout_read_s: 120
    fallback_models: []
  together:
    base_url: "https://api.together.xyz/v1"
    timeout_connect_s: 10
    timeout_read_s: 120
    fallback_models:
      - Qwen/Qwen2.5-72B-Instruct-Turbo
      - meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo
  fireworks:
    base_url: "https://api.fireworks.ai/inference/v1"
    timeout_connect_s: 10
    timeout_read_s: 120
    fallback_models:
      - accounts/fireworks/models/llama-v3p1-8b-instruct
      - accounts/fireworks/models/qwen2p5-72b-instruct
  bitnet:
    base_url: "http://sutra-ai-bitnet:8081/v1"
    timeout_connect_s: 5
    timeout_read_s: 60
    fallback_models:
      - bitnet-2b
  fast_local:
    # OpenAI-compatible fast local server (vLLM/TGI)
    base_url: "http://sutra-ai-fastlocal:8000/v1"
    timeout_connect_s: 3
    timeout_read_s: 90
    fallback_models:
      - qwen2.5:3b
      - qwen2.5:1.5b
  ollama:
    base_url: "http://sutra-ai-ollama:11434"
    timeout_connect_s: 10
    timeout_read_s: 60
    fallback_model: "qwen3:1.7b"       # Legacy single fallback (merged into fallback_models)
    fallback_models:
      - qwen3:1.7b
      - qwen2.5:3b
      - qwen2.5:1.5b
      - phi4-mini
      - smollm2:360m
    profiles:
      low_latency:
        num_predict: 320
        temperature: 0.2
        top_k: 30
        top_p: 0.9
      quality:
        num_predict: 1024
        temperature: 0.5
        top_k: 45
        top_p: 0.95
      compact:                    # NEW — for ≤8 GB machines
        num_predict: 512
        num_ctx: 2048             # 2K context vs default 4K — halves RAM
        temperature: 0.3
        top_k: 20
        top_p: 0.85
        num_thread: 4             # Leave 2 cores for OS + containers
  gemini:
    timeout_connect_s: 10
    timeout_read_s: 120
    fallback_models:
      - gemini-2.0-flash
      - gemini-2.0-flash-lite
  anthropic:
    timeout_connect_s: 10
    timeout_read_s: 120
    fallback_models:
      - claude-3-5-haiku-20241022
      - claude-3-5-haiku-latest


