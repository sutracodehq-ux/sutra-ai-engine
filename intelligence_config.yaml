# ─── Embeddable Chatbot ────────────────────────────────────
chatbot:
  default_agent: "chatbot_trainer"
  confidence_threshold: 0.6         # Below this → escalate to owner
  max_history_messages: 20          # Context window per session
  session_timeout_minutes: 30

  # ─── Brand Identity Injection (Software Factory: config-driven) ──────
  # Forces brand context into the user prompt so even small models (≤2B)
  # stay on-brand. Template placeholders resolve from brand_config fields.
  # Changing tone/format = edit this template. Zero Python changes needed.
  brand_identity_prompt:
    enabled: true
    template: >-
      You are the AI assistant for **{brand_name}**.
      {brand_description}
    # Maps brand_config keys → template placeholders.
    # "fallback" is used when the key is missing from the tenant record.
    context_fields:
      brand_name:
        placeholder: "brand_name"
        fallback: "this brand"
      brand_description:
        placeholder: "brand_description"
        fallback: ""
    # Extra instruction appended to every user prompt.
    # Prevents small models from hallucinating other brand names.
    guardrail: >-
      Respond helpfully and conversationally as this brand's representative.
      Be specific to SutraCode — never give generic advice. Always reference actual
      SutraCode services, pricing, and pages. When discussing services or pricing,
      include specific SutraCode URLs. NEVER mention or pretend to be any other brand.

  # ─── NOTE: Tenant-specific knowledge (pricing, services, portfolio) ──────
  # Now stored in Postgres tenant.config JSONB, seeded from agent_config/*.yaml.
  # Run: python -m app.seeders.run chatbot
  # Edit: agent_config/sutracode_website_bot.yaml → re-run seeder.

  # ─── Brand Auto-Enrichment (Software Factory: automated pipeline) ──────
  # Golden path: tenant.website_url → scrape → LLM extract → tenant.config.
  # Adding new extraction fields = edit extract_fields + extraction_prompt.
  # Zero Python changes needed.
  brand_enricher:
    enabled: true
    auto_enrich_on_first_chat: true       # Lazy trigger (non-blocking)
    re_enrich_interval_days: 30           # Default re-scrape interval (per-tenant override in DB)
    max_pages: 3                          # Crawl depth for enrichment

    # LLM extraction prompt (Software Factory: config-driven)
    extraction_prompt: >-
      Analyze the following website content and extract a brand profile as valid JSON.
      Required keys: brand_description, industry, target_audience, product_info, tone.
      Each value should be 1-2 concise sentences. Return ONLY valid JSON, no markdown.

    # Fields to extract and store in tenant.config
    extract_fields:
      - brand_description
      - industry
      - target_audience
      - product_info
      - tone

    # Quality gate — minimum non-empty fields for enrichment to pass
    quality_gate:
      min_fields: 3
      min_description_length: 20

  # ─── Interactive Actions (Software Factory: config-driven) ──────────
  # Chatbot can suggest clickable actions based on conversation context.
  # Adding new actions = edit this list. Zero Python changes needed.
  # The LLM is instructed to include action IDs in its response.
  interactive_actions:
    enabled: true

    # Available actions — each has an ID, label, icon, URL/type, and keyword triggers
    actions:
      - id: book_appointment
        label: "📅 Book a Free Consultation"
        description: "Schedule a call with our engineering team"
        type: link
        url: "https://sutracode.in/en/contact"
        keywords: ["appointment", "book", "call", "schedule", "meeting", "consult", "demo", "talk"]

      - id: get_estimate
        label: "📊 Get Project Estimate"
        description: "Get a detailed cost & timeline estimate"
        type: link
        url: "/en/estimate"
        keywords: ["estimate", "cost", "price", "quote", "budget", "pricing", "how much", "rate"]

      - id: roi_calculator
        label: "💰 Calculate Your ROI"
        description: "See how much you can save with automation"
        type: action
        action: roi_calculator
        keywords: ["roi", "return on investment", "savings", "automation", "save money", "investment"]

      - id: view_portfolio
        label: "🎨 View Our Portfolio"
        description: "See live projects — PDS Education, Gurukul Dehri, etc."
        type: link
        url: "/en/portfolio"
        keywords: ["portfolio", "projects", "work", "case study", "examples", "clients"]

      - id: view_services
        label: "🛠️ Browse All Services"
        description: "Web dev, SaaS, ERP, digital marketing & more"
        type: link
        url: "/en/services"
        keywords: ["services", "what do you do", "offerings", "capabilities", "solutions", "build"]

      - id: digital_marketing
        label: "📢 Digital Marketing Services"
        description: "Ad management starting at 15% of ad spend"
        type: link
        url: "/en/services/digital-marketing"
        keywords: ["digital marketing", "ads", "facebook", "instagram", "google ads", "social media", "seo", "marketing", "advertising"]

      - id: view_pricing
        label: "💳 View Pricing Plans"
        description: "Transparent pricing for all services"
        type: link
        url: "/en/pricing"
        keywords: ["pricing", "plans", "subscription", "monthly", "cost", "fees"]

      - id: whatsapp_chat
        label: "💬 Chat on WhatsApp"
        description: "Talk to a human on WhatsApp"
        type: link
        url: "https://wa.me/919939826940"
        keywords: ["whatsapp", "human", "person", "agent", "support", "help"]

      - id: call_us
        label: "📞 Call Us Now"
        description: "Direct call: +91 99398 26940"
        type: link
        url: "tel:+919939826940"
        keywords: ["call", "phone", "dial", "ring", "speak"]

    # Max actions to suggest per response
    max_per_response: 3

    # LLM instruction to include action suggestions and relevant links
    action_instruction: >-
      IMPORTANT: You have access to SutraCode's actual data. When users ask about
      pricing, services, or capabilities, use the REAL data from the knowledge_base.

      For digital marketing: pricing is 15% of monthly ad spend (min ₹10,000/month).
      Tiers: Starter (₹10K-30K spend), Growth (₹30K-1L), Scale ★ (₹1L-3L), Enterprise (₹3L+).
      All inclusive: campaign monitoring, creative templates, video/reels, ad copy, monthly reporting.
      Platforms: Meta, Google Ads, YouTube, X, TikTok, LinkedIn.

      ALWAYS suggest 1-3 relevant page links using action IDs at the END of your response like:
      [ACTIONS: get_estimate, digital_marketing]

      When someone asks about pricing → include get_estimate or view_pricing
      When someone asks about services → include view_services or the specific service
      When someone asks about past work → include view_portfolio
      When someone wants to talk to a human → include whatsapp_chat or call_us
      When someone asks about digital marketing → include digital_marketing + get_estimate

      Available actions: book_appointment, get_estimate, roi_calculator, view_portfolio,
      view_services, digital_marketing, view_pricing, whatsapp_chat, call_us

  # Auto-escalation to brand owner
  escalation:
    confidence_threshold: 0.6
    whatsapp:
      api_url: null                 # Set via env: WHATSAPP_API_URL
      api_key: null                 # Set via env: WHATSAPP_API_KEY
      default_owner_phone: null     # Per-brand in DB, fallback here

  # Holding messages (shown while waiting for owner)
  holding_messages:
    en: "Let me check on that for you. I'll get back shortly!"
    hi: "मैं इसकी जांच कर रही हूँ। जल्दी ही जवाब दूँगी!"
    ta: "நான் அதைச் சரிபார்க்கிறேன். விரைவில் பதிலளிக்கிறேன்!"

