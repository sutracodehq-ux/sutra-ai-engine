# ─── Personal Assistant (Tenant Companion) ─────────────────
# Adding new tenant attributes = add to context_fields. Zero Python changes.
personal_assistant_config:
  enabled: true
  default_agent: "personal_assistant"     # Hub identifier
  auto_load_default_voice: true           # Auto-fetch tenant's default VoiceProfile

  # ─── Context Injection Pipeline (fully config-driven) ────
  # Each injector runs in order. To add a new data source:
  # just add a new entry here. Python is a generic loop.
  injectors:

    # Injector 1: Tenant Identity → system prompt
    tenant_identity:
      enabled: true
      # Field map: context_key → {placeholder, fallback}
      # Adding a new field = add one line here. NEVER touch Python.
      context_fields:
        tenant_name:        { placeholder: "tenant_name",        fallback: "Unknown" }
        tenant_description: { placeholder: "tenant_description", fallback: "Not provided" }
        tenant_industry:    { placeholder: "tenant_industry",    fallback: "Not specified" }
        tenant_email:       { placeholder: "tenant_email",       fallback: "Not provided" }
        # ─── Future fields: just add lines here ───
        # tenant_goals:     { placeholder: "tenant_goals",      fallback: "Not set" }
        # tenant_kpis:      { placeholder: "tenant_kpis",       fallback: "Not set" }
        # tenant_competitors: { placeholder: "tenant_competitors", fallback: "None" }
        # tenant_budget:    { placeholder: "tenant_budget",     fallback: "Not specified" }
      # Required field — if missing, skip injection entirely
      required_field: "tenant_name"
      # Template with {placeholders} that match context_fields above
      template: |
        ## Your Identity & Tenant
        You are the personal AI assistant for **{tenant_name}**.
        When introducing yourself, say "I'm your {tenant_name} assistant" or
        similar. You represent this brand — not a generic AI.

        - **Brand**: {tenant_name}
        - **Mission**: {tenant_description}
        - **Industry**: {tenant_industry}
        - **Contact**: {tenant_email}

    # Injector 2: Qdrant Intelligence → message context
    tenant_intelligence:
      enabled: true
      max_chunks: 5
      relevance_threshold: 0.35
      label: "TENANT INTELLIGENCE MEMORY"   # Prefix in context_chunks

    # Injector 3: (Future) Competitor Data → system prompt
    # competitor_context:
    #   enabled: false
    #   source: "qdrant"
    #   collection_suffix: "_competitors"
    #   template: |
    #     ## Competitor Landscape
    #     {competitor_data}

  # Template for injecting past intelligence results
  intelligence_injection_template: |
    ## Your Memory (Past Analyses)
    The following are results from previous analyses for this tenant.
    Use them to give personalized, consistent, context-aware advice.

    {intelligence_context}

# ─── Tenant Learning (Qdrant) ─────────────────────────────
# Every analysis result is stored in a tenant-scoped vector collection.
# Future calls retrieve past context to produce personalized responses.
# Collection format: "{collection_prefix}_{tenant_id}_intelligence"

tenant_learning:
  enabled: true
  collection_prefix: "tenant"
  max_context_chunks: 3
  min_relevance: 0.4
  context_injection_template: |
    ### Tenant Context (previous analyses for this account):
    {context}

    Use the above context to provide more personalized, consistent insights.
  # Per-pipeline learning settings
  pipelines:
    brand_analyze:
      store: true
      retrieve: true
    sentiment:
      store: true
      retrieve: false
    language_detect:
      store: false
      retrieve: false
    language_translate:
      store: false
      retrieve: false
    url_analyze:
      store: true
      retrieve: true
    seo_audit:
      store: true
      retrieve: true
    competitor_analyze:
      store: true
      retrieve: true
    hashtag_suggest:
      store: true
      retrieve: true
    personal_assistant:
      store: true
      retrieve: true

# ─── Intelligence Pipelines (Software Factory) ─────────────
# Each pipeline defines: prompt, driver_chain, timeout, expected output.
# Python services call run_pipeline(name, {vars}) — they NEVER define
# their own prompts, driver loops, or JSON parsing.
# Adding a new pipeline = add YAML entry here. Zero code changes.

intelligence_pipelines:

  brand_analyze:
    system_prompt: >
      You are a Senior Brand Strategist and Digital Marketing Analyst.
      Your job is to perform a COMPREHENSIVE brand audit from website content.
      Extract every possible insight — identity, positioning, digital footprint,
      content strategy, competitive signals, and market presence.
      Always respond with valid JSON only. Be detailed and analytical.
    prompt_template: |
      Perform a DEEP brand analysis of the website: {url}

      Analyze every signal in the content below — copy, structure, tone,
      keywords, product mentions, pricing signals, tech references, social proof,
      and competitive positioning.

      WEBSITE CONTENT:
      {content}

      ### Output Format:
      Return ONLY a detailed JSON object with ALL of the following sections:

      {{
        "brand_identity": {{
          "name": "Official company/brand name",
          "tagline": "Primary tagline or slogan",
          "mission": "Detailed mission statement (2-3 sentences)",
          "vision": "Long-term vision or aspirational goal",
          "brand_story": "Brief narrative of what the brand is about (3-4 sentences)",
          "founding_context": "When/why founded, origin story if available"
        }},
        "voice_and_tone": {{
          "writing_style": "e.g., Professional, Conversational, Technical, Playful",
          "formality_level": "Formal | Semi-formal | Casual | Ultra-casual",
          "personality_traits": ["trait1", "trait2", "trait3"],
          "emotional_appeal": "What emotions does the brand try to evoke?",
          "language_complexity": "Simple | Moderate | Technical | Academic"
        }},
        "target_audience": {{
          "primary_audience": "Main customer segment description",
          "secondary_audiences": ["segment1", "segment2"],
          "demographics": "Age range, profession, income level if detectable",
          "psychographics": "Values, interests, lifestyle of ideal customer",
          "pain_points_addressed": ["pain1", "pain2", "pain3"]
        }},
        "products_and_services": {{
          "primary_offerings": ["product/service 1", "product/service 2"],
          "value_proposition": "Core value proposition in one sentence",
          "pricing_model": "Free | Freemium | Subscription | One-time | Enterprise | Not visible",
          "pricing_signals": "Any pricing tiers, plans, or cost mentions detected",
          "key_features": ["feature1", "feature2", "feature3"]
        }},
        "industry_and_positioning": {{
          "industry": "Primary industry/sector",
          "sub_sector": "Specific niche within the industry",
          "market_position": "Leader | Challenger | Niche | Emerging | Established",
          "competitive_advantages": ["advantage1", "advantage2"],
          "differentiators": "What makes them unique vs competitors"
        }},
        "digital_presence": {{
          "website_purpose": "Lead gen | E-commerce | SaaS | Portfolio | Content/Media | Institutional",
          "content_types_detected": ["blog", "case studies", "docs", "pricing page", "testimonials"],
          "cta_patterns": ["Primary CTA text", "Secondary CTA text"],
          "seo_signals": "Keyword focus, meta description quality, heading structure",
          "social_channels_mentioned": ["channel1", "channel2"]
        }},
        "visual_identity": {{
          "color_palette_hints": "Colors mentioned or dominant theme (dark, vibrant, minimal)",
          "design_aesthetic": "Modern | Classic | Minimalist | Bold | Playful | Corporate",
          "imagery_style": "Photography | Illustrations | Icons | 3D | Abstract",
          "typography_hints": "Clean sans-serif | Traditional serif | Handwritten | Monospace"
        }},
        "content_strategy": {{
          "key_topics": ["topic1", "topic2", "topic3"],
          "content_frequency_signal": "Active blog | Sparse updates | No blog | News-heavy",
          "thought_leadership": "Does the brand position as an industry thought leader?",
          "educational_content": true,
          "case_studies_present": false
        }},
        "social_proof": {{
          "testimonials_present": true,
          "client_logos_present": false,
          "stats_and_numbers": ["stat1", "stat2"],
          "awards_certifications": ["if any detected"],
          "partnerships_mentioned": ["partner1", "partner2"],
          "trust_signals": "What credibility markers are present?"
        }},
        "technology_signals": {{
          "tech_stack_hints": ["framework", "platform", "tool"],
          "integrations_mentioned": ["integration1", "integration2"],
          "api_references": "Does the site mention APIs or developer tools?",
          "mobile_app_available": false
        }},
        "geographic_presence": {{
          "headquarters": "City, Country if detectable",
          "markets_served": ["market1", "market2"],
          "language_options": ["en", "hi"],
          "global_vs_local": "Global | Regional | Local | Not clear"
        }},
        "core_values": ["Value 1", "Value 2", "Value 3", "Value 4", "Value 5"],
        "strengths": ["strength1", "strength2", "strength3"],
        "weaknesses_or_gaps": ["gap1", "gap2"],
        "overall_brand_score": {{
          "clarity": 8,
          "consistency": 7,
          "differentiation": 6,
          "digital_maturity": 7,
          "content_quality": 8,
          "overall": 7.2,
          "summary": "2-3 sentence executive summary of the brand's digital presence"
        }}
      }}

      Be thorough. If information is not available, use "Not detected" or empty arrays.
      NEVER skip a section. Return the COMPLETE JSON.
    driver_chain: [groq, gemini, anthropic, ollama]
    timeout_seconds: 45
    expected_fields: [brand_identity, voice_and_tone, target_audience, products_and_services, industry_and_positioning, digital_presence, core_values, overall_brand_score]
    temperature: 0.1
    json_mode: true
    max_content_chars: 8000
    fallback_response:
      brand_identity: { name: "Not detected", tagline: "Not detected", mission: "Temporarily unavailable", vision: "Temporarily unavailable", brand_story: "Temporarily unavailable", founding_context: "Not detected" }
      voice_and_tone: { writing_style: "Not detected", formality_level: "Not detected", personality_traits: [], emotional_appeal: "Not detected", language_complexity: "Not detected" }
      target_audience: { primary_audience: "Not detected", secondary_audiences: [], demographics: "Not detected", psychographics: "Not detected", pain_points_addressed: [] }
      products_and_services: { primary_offerings: [], value_proposition: "Temporarily unavailable", pricing_model: "Not visible", pricing_signals: "Not detected", key_features: [] }
      industry_and_positioning: { industry: "Not detected", sub_sector: "Not detected", market_position: "Not clear", competitive_advantages: [], differentiators: "Temporarily unavailable" }
      digital_presence: { website_purpose: "Not clear", content_types_detected: [], cta_patterns: [], seo_signals: "Temporarily unavailable", social_channels_mentioned: [] }
      core_values: []
      overall_brand_score: { clarity: 0, consistency: 0, differentiation: 0, digital_maturity: 0, content_quality: 0, overall: 0.0, summary: "Fallback response: live analysis temporarily unavailable." }

  sentiment:
    system_prompt: >
      You are a sentiment analyzer. Be fast, accurate, and output raw JSON only.
    prompt_template: |
      Analyze the sentiment and tone of the following user message.
      Return ONLY a JSON object with this schema:
      {{"score": "float (-1.0 to 1.0)",
        "label": "angry|frustrated|neutral|happy|excited",
        "vibe": "string describing the vibe"}}

      USER MESSAGE: "{text}"
    driver_chain: [groq, gemini, anthropic, ollama]
    timeout_seconds: 15
    expected_fields: [score, label, vibe]
    temperature: 0.0
    json_mode: true
    fallback_response:
      score: 0.0
      label: neutral
      vibe: error_fallback

  language_detect:
    system_prompt: "You are a language detector. Output raw JSON ONLY."
    prompt_template: |
      Identify the language of the text below.
      Return ONLY a JSON object with:
      {{"code": "iso_639_1_code", "name": "Full Language Name",
        "confidence": "float (0.0 to 1.0)"}}

      TEXT: "{text}"
    driver_chain: [groq, gemini, anthropic, ollama]
    timeout_seconds: 15
    expected_fields: [code, name, confidence]
    temperature: 0.0
    json_mode: true
    max_content_chars: 500
    fallback_response:
      code: en
      name: English
      confidence: 0.0

  language_translate:
    system_prompt: >
      You are a professional translator. Only return the translated text.
    prompt_template: "Translate the following to {target_lang}:\n\n{text}"
    driver_chain: [groq, gemini, anthropic, ollama]
    timeout_seconds: 20
    temperature: 0.3
    json_mode: false
    fallback_response: "Translation service is temporarily unavailable. Please retry shortly."

  hashtag_suggest:
    driver_chain: [groq, gemini, anthropic]
    timeout_seconds: 20
    json_mode: true
    fallback_response:
      hashtags: []
      reasoning: "Fallback response: hashtag suggestion is temporarily unavailable."

  seo_audit:
    crawl_timeout_seconds: 30
    llm_timeout_seconds: 20
    fallback_response:
      summary: "SEO audit is temporarily unavailable. Please retry shortly."
      findings: []
      recommendations: []

  competitor_analyze:
    crawl_timeout_seconds: 30
    llm_timeout_seconds: 20
    fallback_response:
      summary: "Competitor analysis is temporarily unavailable. Please retry shortly."
      competitors: []
      opportunities: []

  url_analyze:
    crawl_timeout_seconds: 45
    fallback_response:
      summary: "URL analysis is temporarily unavailable. Please retry shortly."
      insights: []

# ─── Image Generation Configuration ────────────────────────
# Config-driven multi-provider image generation.
# Adding a new provider = add YAML entry + driver class. Zero service changes.
# All defaults here are used when schema passes None (no client override).
image_generation:
  enabled: true

  # Driver fallback chain (cheapest first, premium fallback)
  driver_chain: [fal, openai]
  # Future: [fal, openai, gemini, stability]

  # Default generation parameters (used when client does not specify)
  defaults:
    size: "square_hd"
    quality: "standard"        # standard | hd
    style: "natural"           # natural | vivid
    n: 1                       # Number of images

  # Provider-specific configuration (read by each driver)
  providers:
    fal:
      model: "fal-ai/flux/schnell"       # Ultra-fast, $0.003/image
      sizes: ["square_hd", "landscape_16_9", "landscape_4_3", "portrait_16_9", "portrait_4_3"]
      max_prompt_length: 5000
      supports_quality: false
      supports_style: false
      num_inference_steps: 4              # Schnell is optimized for 4 steps
      cost_per_image:
        standard: 0.003
    openai:
      model: "dall-e-3"
      sizes: ["1024x1024", "1024x1792", "1792x1024"]
      max_prompt_length: 4000
      supports_quality: true
      supports_style: true
      cost_per_image:
        standard: 0.04
        hd: 0.08
    # ─── Future providers (uncomment when keys available) ───
    # gemini:
    #   model: "imagen-3.0-generate-002"
    #   sizes: ["1024x1024", "1024x1536", "1536x1024"]
    #   cost_per_image: { standard: 0.00 }
    # stability:
    #   model: "stable-diffusion-3.5-large"
    #   base_url: "https://api.stability.ai/v2beta"
    #   cost_per_image: { standard: 0.065 }

  # Prompt enhancement pipeline (uses text LLM to refine user prompts)
  prompt_enhancement:
    enabled: true
    max_prompt_length: 400

  # Content safety
  safety:
    block_explicit: true
    block_violence: true
    log_all_prompts: true

  # Size presets (maps friendly names → provider-specific values)
  # These are resolved in ImageGenerationService — clients can use either.
  size_presets:
    social_square: "square_hd"
    social_story: "portrait_16_9"
    social_landscape: "landscape_16_9"
    banner_wide: "landscape_16_9"
    avatar: "square_hd"
    thumbnail: "square_hd"
    presentation: "landscape_16_9"

# ─── Video Generation Configuration ────────────────────────
# Config-driven multi-provider video generation.
# Adding a new provider = add YAML entry + driver class. Zero service changes.
video_generation:
  enabled: true

  # Driver fallback chain
  driver_chain: [fal]
  # Future: [fal, runway, veo]

  # Default generation parameters (used when client does not specify)
  defaults:
    duration: "5"              # 5 or 10 seconds
    aspect_ratio: "16:9"       # 16:9, 9:16, 1:1

  # Provider-specific configuration
  providers:
    fal:
      model: "fal-ai/kling-video/v3/standard/text-to-video"
      durations: ["5", "10"]
      aspect_ratios: ["16:9", "9:16", "1:1"]
      cost_per_second: 0.07
    # ─── Future providers ───
    # runway:
    #   model: "gen-4"
    #   cost_per_second: 0.10
    # veo:
    #   model: "veo-3.1-lite"
    #   cost_per_second: 0.05

  # Prompt enhancement pipeline
  prompt_enhancement:
    enabled: true
    max_prompt_length: 500

  # Content safety
  safety:
    block_explicit: true
    block_violence: true
    log_all_prompts: true
    max_duration: "10"         # Hard cap regardless of request
